<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አስተዳዳሪ መግቢያ - Ethio Exit Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .error {
            color: #ef4444;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 አስተዳዳሪ መግቢያ</h1>
        <div class="input-group">
            <label>የተጠቃሚ ስም</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="input-group">
            <label>የይለፍ ቃል</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="adminLogin()">ግባ</button>
        <div class="error" id="errorMsg">ስም ወይም የይለፍ ቃል ትክክል አይደለም</div>
    </div>

   <script>
    // ✅ የእርስዎን Worker URL እዚህ ያስገቡ
    const API_URL = 'https://flat-mud-a477.codeofsaladin.workers.dev';
    
    async function adminLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const res = await fetch(`${API_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
                credentials: 'include'
            });
            
            if (res.ok) {
                window.location.href = '/admin-panel.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        } catch (error) {
            alert('ስህተት ተፈጥሯል: ' + error.message);
        }
    }
</script>
</body>
</html>
